<div class="stats-dialog-backdrop" (click)="close.emit()">
    <div class="stats-dialog-body" (click)="$event.stopPropagation()">
        <button type="button" class="stats-dialog-close" aria-label="Close dialog" (click)="close.emit()">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                stroke-linecap="round" stroke-linejoin="round" xmlns="http://www.w3.org/2000/svg">
                <line x1="18" y1="6" x2="6" y2="18" />
                <line x1="6" y1="6" x2="18" y2="18" />
            </svg>
        </button>

        <h2 class="stats-dialog-title">Статистика страницы</h2>

        <div class="stats-cards">
            <div class="stats-card">
                <p class="stats-card-label">Всего статей:</p>
                <p class="stats-card-value">{{ articlesCount() }}</p>
            </div>

            <div class="stats-card">
                <p class="stats-card-label">Комментарии:</p>
                <p class="stats-card-value">0</p>
            </div>
        </div>
    </div>
</div>
